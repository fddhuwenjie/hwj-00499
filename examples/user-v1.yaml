openapi: 3.0.0
info:
  title: User Service API
  version: 1.0.0
  description: 用户服务 API v1

servers:
  - url: https://api.example.com/v1

paths:
  /users:
    get:
      summary: 获取用户列表
      description: 分页获取用户列表
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
          description: 每页数量
      responses:
        '200':
          description: 成功返回用户列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  list:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '400':
          description: 请求参数错误
    post:
      summary: 创建用户
      description: 创建一个新用户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: 用户创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: 请求参数错误
        '409':
          description: 用户已存在

  /users/{id}:
    get:
      summary: 获取用户详情
      description: 根据ID获取用户详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 用户ID
      responses:
        '200':
          description: 成功返回用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: 用户不存在
    put:
      summary: 更新用户
      description: 更新用户信息
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 用户ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: 请求参数错误
        '404':
          description: 用户不存在
    delete:
      summary: 删除用户
      description: 删除指定用户
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 用户ID
      responses:
        '204':
          description: 删除成功
        '404':
          description: 用户不存在

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          description: 用户ID
        username:
          type: string
          description: 用户名
        email:
          type: string
          description: 邮箱
        age:
          type: integer
          description: 年龄
        createdAt:
          type: string
          format: date-time
          description: 创建时间
      required:
        - id
        - username
        - email

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
          description: 用户名
        email:
          type: string
          description: 邮箱
        password:
          type: string
          description: 密码
        age:
          type: integer
          description: 年龄
      required:
        - username
        - email
        - password

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
          description: 用户名
        email:
          type: string
          description: 邮箱
        age:
          type: integer
          description: 年龄

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
